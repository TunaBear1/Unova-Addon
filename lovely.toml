[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

#Blind Size Modifier
[[patches]]
[patches.pattern]
target = 'blind.lua'
pattern = '''
self.chips = get_blind_amount(G.GAME.round_resets.ante)*self.mult*G.GAME.starting_params.ante_scaling
'''
position = "after"
payload = '''
if G.GAME.modifiers.unova_X_blind_size then
    self.chips = self.chips*G.GAME.modifiers.unova_X_blind_size
end
'''
match_indent = true
